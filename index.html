<!doctype html><html lang="no"><head><meta charset="utf-8">
<title>Åstadheia Bryggekart</title>
<style>
html,body{margin:0;padding:0;background:#fff;font-family:Arial}
#toolbar{position:fixed;top:10px;right:10px;z-index:1000;background:rgba(255,255,255,.9);padding:8px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,.25)}
#wrap{position:relative;display:inline-block}
#map{display:block;max-width:100vw;height:auto}
.pt{position:absolute;width:26px;height:26px;transform:translate(-50%,-50%);cursor:pointer;background:rgba(0,0,0,0)}
#popup{display:none;position:fixed;right:10px;top:60px;width:260px;background:#fff;border-radius:8px;padding:12px;box-shadow:0 3px 12px rgba(0,0,0,.35)}
#popup h3{margin:0 0 8px}
</style></head><body>
<div id="toolbar">
<input id="search" placeholder="A-17"><button onclick="findBoat()">Finn</button>
</div>
<div id="wrap"><img id="map" src="images/bryggekart.png"></div>
<div id="popup"></div>
<script>
let boats={};
fetch("boatdata.json").then(r=>r.json()).then(d=>{
 boats=d;
 const w=document.getElementById("wrap");
 for(const id in d){
  const e=document.createElement("div");
  e.className="pt";
  e.style.left=d[id].x+"px";
  e.style.top=d[id].y+"px";
  e.title=id;
  e.onclick=()=>showBoat(id);
  w.appendChild(e);
 }
});
function showBoat(id){
 const b=boats[id];
 const p=document.getElementById("popup");
 p.style.display="block";
 p.innerHTML=`<h3>${id}</h3>
 <b>${b.status}</b><hr>
 Eier: ${b.eier||"-"}<br>
 Bruker: ${b.bruker||"-"}<br>
 Telefon: ${b.telefon||"-"}`;
}
function findBoat(){
 const id=document.getElementById("search").value.toUpperCase();
 if(boats[id]) showBoat(id); else alert("Fant ikke "+id);
}
</script></body></html>
